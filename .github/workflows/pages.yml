# Build with eigen and deploy to GitHub Pages
name: Website

on:
  push:
    branches: ["master"]
    paths:
      - 'website/**'
      - '.github/workflows/pages.yml'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      # Nix docs contain ${system} references — set to itself so
      # eigen's interpolation is a no-op.
      system: ${system}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with eigen
        uses: wavefunk/eigen/github-action@master
        with:
          source: './website'
      - name: Add CNAME
        run: cp -f website/CNAME website/dist/CNAME
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'website/dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
