<nav>
  <div class="container">
    <a {{ link_to("/index.html") }} class="nav-logo">youwhat(k)now</a>
    <div class="nav-links">
      {% for item in nav %}
        {% if item.external %}
        <a href="{{ item.url }}" target="_blank" rel="noopener">{{ item.label }}</a>
        {% else %}
        <a {{ link_to(item.url) }}>{{ item.label }}</a>
        {% endif %}
      {% endfor %}
    </div>
  </div>
</nav>
